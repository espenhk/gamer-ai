name: Update Knowledge Graph

on:
  push:
    branches:
      - main
    paths:
      # Only trigger when source code or docs change — not when the graph
      # itself is updated (avoids infinite loops from the bot commit).
      - 'framework/**'
      - 'games/**'
      - 'docs/**'
      - 'tests/**'
      - 'main.py'
      - 'grid_search.py'
      - 'policies.py'
      - 'analytics.py'
      - '*.md'

jobs:
  update-graph:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so git diff can compare commits
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install graphify
        run: pip install graphifyy -q

      - name: Update knowledge graph (AST-only, no LLM)
        run: python .github/scripts/update_graph.py

      - name: Commit updated graph
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add graphify-out/graph.json graphify-out/GRAPH_REPORT.md graphify-out/manifest.json graphify-out/cost.json
          if git diff --cached --quiet; then
            echo "No graph changes — nothing to commit."
          else
            git commit -m "chore: update knowledge graph [skip ci]"
            git push
          fi
