# Assetto Corsa training parameters.

game: assetto                # game module to use
speed: 1.0                   # Assetto Corsa does not support a simple speed multiplier
in_game_episode_s: 120.0     # in-game seconds per episode
n_sims: 100
mutation_scale: 0.05
mutation_share: 1.0
adaptive_mutation: true
probe_s: 30.0
cold_restarts: 20
cold_sims: 5
n_lidar_rays: 0
patience: 0

policy_type: genetic

policy_params:
  population_size: 20
  elite_k: 3
