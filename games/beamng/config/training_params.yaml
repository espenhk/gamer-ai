# BeamNG training parameters.
# Mirrors the TMNF config structure with BeamNG-specific defaults.

game: beamng                 # game module to use
speed: 1.0                   # BeamNG does not support a simple speed multiplier
in_game_episode_s: 120.0     # in-game seconds per episode
n_sims: 100                  # greedy simulations / generations after cold-start
mutation_scale: 0.05         # std-dev of Gaussian noise applied to each perturbed weight
mutation_share: 1.0          # fraction of weights perturbed per mutation (1.0 = all)
adaptive_mutation: true      # apply 1/5th success rule during greedy phase
probe_s: 30.0                # in-game seconds for each probe action run
cold_restarts: 20            # max random restarts during cold-start search
cold_sims: 5                 # hill-climb sims per cold-start restart
n_lidar_rays: 0              # not applicable for BeamNG (uses direct sensor data)
patience: 0                  # stop greedy loop if no improvement for this many sims (0 = run all)

# Policy algorithm for the greedy training phase.
policy_type: genetic

policy_params:
  population_size: 20
  elite_k: 3
