# Grid search config template for StarCraft 2.
# Usage:
#   python grid_search.py games/sc2/config/my_grid.yaml --game sc2 [--track CollectMineralShards] [--no-interrupt]
#
# Any param set to a list becomes a search axis.

base_name: "gs_sc2_template_v1"
game: sc2

# ---------------------------------------------------------------------------
# Training params
# ---------------------------------------------------------------------------
training_params:
  map_name: MoveToBeacon
  speed: 1.0
  n_sims: 50
  in_game_episode_s: 120.0
  mutation_scale: 0.05
  mutation_share: 1.0
  policy_type: genetic
  step_mul: 8
  screen_size: 64
  minimap_size: 64
  agent_race: random

# ---------------------------------------------------------------------------
# Reward params
# ---------------------------------------------------------------------------
reward_params:
  progress_weight: 10.0
  step_penalty: -0.01
