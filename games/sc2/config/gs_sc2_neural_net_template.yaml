# Grid search template: sc2_neural_net with very large hidden layers.
#
# Usage:
#   python grid_search.py games/sc2/config/gs_sc2_neural_net_template.yaml --game sc2
#
# Designed to test whether extremely large TMNF-style MLPs (multimillion
# parameters) can learn useful SC2 behaviour under hill-climbing.
#
# Memory note: large hidden_sizes are safe because SC2NeuralNetPolicy.mutated()
# pre-allocates per-shape float32 noise buffers and generates noise directly in
# float32 (no float64 intermediate).  Before that fix, each mutation created a
# temporary float64 array (2× the weight matrix size) that repeatedly fragmented
# the Windows heap until contiguous allocations failed (issue #456).

base_name: "massive_v3"
game: sc2

training_params:
  map_name: BuildMarines
  in_game_episode_s: 600.0
  step_mul: 4
  obs_spec_preset: rich
  enable_belief: false
  #enable_belief: true              # tabular state-space explosion; see comment above
  policy_type: sc2_neural_net
  n_sims: 200
  max_apm: 300
  agent_race: terran
  #economy_weight: 0.5
  hidden_sizes:
    - [1024, 2048, 2048, 1024]
    - [2048, 4096, 4096, 2048]

reward_params:
  score_weight: 1000.0
  idle_worker_penalty: -0.001
  army_growth_bonus: 50.0
  train_bonus: 20.0
  #score_weight: 1000.0
  #idle_bonus: -0.5
  #idle_penalty: -0.5
  #early_random_action_bonus: 10.0
  #early_random_action_window_steps: 300
