# Grid search template: sc2_neural_net on BuildMarines (Simple64).
#
# Usage:
#   python grid_search.py games/sc2/config/gs_sc2_neural_net_template.yaml --game sc2
#
# sc2_neural_net uses mutate-and-keep hill-climbing, so hidden_sizes must stay
# small enough that (a) each weight matrix fits comfortably in memory and (b)
# the search space is tractable.  Rule of thumb: the largest single weight
# matrix should be well under 1 MiB (~250 k float32 elements).  For obs_dim ~295
# (rich + belief) the practical ceiling is around [256, 128]; going larger gives
# no benefit and risks OOM via heap fragmentation on long Windows runs (issue #456).

base_name: "gs_sc2_neural_net_v1"
game: sc2

training_params:
  map_name: Simple64
  in_game_episode_s: 600.0
  step_mul: 4
  obs_spec_preset: rich
  enable_belief: true
  policy_type: sc2_neural_net
  n_sims: 500
  max_apm: 300
  agent_race: terran
  move_exploration_bonus: [0.01, 0.1]
  damage_taken_penalty: [-0.1, -0.5]
  hidden_sizes:
    - [64, 64]
    - [128, 128]
    - [256, 128]

reward_params:
  score_weight: 1.0
  idle_bonus: -0.5
  idle_penalty: -0.5
  early_random_action_bonus: 10.0
  early_random_action_window_steps: 300
